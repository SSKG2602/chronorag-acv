embeddings: {name: BAAI/bge-small-en-v1.5, dim: 384}
retrieval_profiles:
  light:
    embeddings: {name: BAAI/bge-small-en-v1.5, dim: 384}
    note: "Default lightweight profile. Exact-time ranking still depends on symbolic temporal precision scoring."
  strong:
    embeddings: {name: BAAI/bge-base-en-v1.5, dim: 768}
    reranker: {name: BAAI/bge-reranker-v2-m3}
    note: "Recommended Layer 2A cloud retrieval profile. Exact-time ranking still depends on symbolic temporal precision scoring."
  experimental_heavy:
    embeddings: {name: Qwen/Qwen3-Embedding-0.6B}
    reranker: {name: Qwen/Qwen3-Reranker-0.6B}
    note: "Optional heavy profile. It must not replace symbolic exact-date/timestamp scoring."
reranker:
  name: BAAI/bge-reranker-v2-m3
  device: "auto"
  fallback: cross-encoder/ms-marco-MiniLM-L-6-v2

llm:
  strategy_order: ["local_hf", "openai_compat"]
  prompt_limits:
    max_passages: 16
    snippet_chars: 120
  provider_env: CHRONORAG_PROVIDER
  vertex:
    project_env: GOOGLE_CLOUD_PROJECT
    location_env: GOOGLE_CLOUD_LOCATION
    model_env: VERTEX_MODEL_ID
    default_location: us-central1
    default_model: gemini-2.5-flash
    max_output_tokens: 512
  local_hf:
    model_path: microsoft/Phi-3-mini-4k-instruct
    allow_remote: true
    dtype: float16   # set to float32 for CPU-only environments
    device_map: auto
    token_env: HF_TOKEN  # set this env var if the repo requires gated access
    max_new_tokens: 512
    temperature: 0.0
    stop: ["<|ATTR_CARD|>"]
  openai_compat:
    endpoint_env: LLM_ENDPOINT
    api_key_env: LLM_API_KEY
    model: "microsoft/Phi-3-mini-4k-instruct"
    max_tokens: 900
    temperature: 0.0
    stop: ["<|ATTR_CARD|>"]
