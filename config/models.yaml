embeddings: {name: BAAI/bge-base-en-v1.5, dim: 768}
reranker:
  name: BAAI/bge-reranker-v2-m3
  device: "auto"
  fallback: cross-encoder/ms-marco-MiniLM-L-6-v2

llm:
  strategy_order: ["lightning_ai"]
  prompt_limits:
    max_passages: 16
    snippet_chars: 120
  lightning_ai:
    base_url: "https://lightning.ai/api/v1/"
    api_key_env: LIGHTNING_API_KEY
    api_key_default: "b829fb3f-d518-42df-9333-f5a657b5a5c7/asthaclover26/deploy-model-project"
    model: "openai/gpt-5"
    max_tokens: 900
    temperature: 0.0
    stop: ["<|ATTR_CARD|>"]
